<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="./panda.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUPEL</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b221b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./panda.png">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Soft Matrix Theme - Eye Care */
        body {
            background: #0d0f0d; 
            color: #88aa88; 
            font-family: 'Consolas', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        #app {
            width: 95%; max-width: 400px;
            background: #121412; 
            border: 1px solid #1a1d1a;
            padding: 25px; border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h2 { text-align: center; letter-spacing: 5px; margin-top: 0; color: #557755; font-size: 1.2em; }

        #display {
            height: 350px; border: 1px solid #1a1d1a;
            overflow-y: auto; margin: 15px 0; padding: 12px;
            background: #0a0b0a; font-size: .85em;
            display: flex; flex-direction: column; scroll-behavior: smooth;
        }

        input {
            width: 100%; padding: 12px; background: #161a16;
            border: 1px solid #222; color: #aaccaa; outline: 0;
            margin-bottom: 8px; box-sizing: border-box; font-family: inherit;
        }

        button {
            width: 100%; padding: 12px; background: #2a332a;
            border: 1px solid #3a443a; color: #88aa88;
            font-weight: 600; cursor: pointer; text-transform: uppercase;
            transition: .3s; font-family: inherit;
        }
        button:hover { background: #3a443a; color: #aaccaa; }

        .m { margin: 6px 0; padding: 10px 14px; border-radius: 4px; max-width: 85%; line-height: 1.5; word-wrap: break-word; }

        /* Majtas (Mesazhi i marrë) - Jeshile e vrarë, shkronja të zeza */
        .r { background: #88aa88; align-self: flex-start; color: #0d0f0d; font-weight: 600; border-bottom-left-radius: 0; }

        /* Djathtas (Mesazhi yt) - Gri/Jeshile e errët, shkronja të bardha */
        .l { background: #1b221b; align-self: flex-end; text-align: right; border: 1px solid #2a332a; color: #e0eee0; border-bottom-right-radius: 0; }

        .sys { color: #445544; font-size: .7em; text-align: center; margin: 10px 0; font-style: italic; }
        .donate-link { display: block; text-align: center; margin-top: 25px; color: #445544; text-decoration: none; font-size: 0.7em; letter-spacing: 1px; transition: 0.3s; }
        .donate-link:hover { color: #88aa88; }
    </style>
</head>

<div id="app">
    <h2>PUPEL</h2>

        <input type="text" id="room-input" placeholder="ROOM NAME" autocomplete="off" spellcheck="false" autocorrect="off">
        <button id="btn-join">JOIN ROOM</button>
        <a href="https://buymeacoffee.com/marascan" target="_blank" class="donate-link">☕ SUPPORT MARASCAN</a>
    </div>
    <div id="chat-screen" style="display:none">
        <div id="display"><div class="sys">SESSION ACTIVATED. NO LOGS.</div></div>
        <input type="text" id="msg-input" placeholder="Message..." autocomplete="off" spellcheck="false" autocorrect="off">
        <button id="btn-send">SEND</button>
    </div>
</div>
